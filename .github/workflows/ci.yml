name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AutoHub.Microservices.slnx

      - name: Check vulnerable packages
        run: dotnet list AutoHub.Microservices.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build AutoHub.Microservices.slnx -c Release --no-restore

      - name: Test with coverage gate
        run: |
          dotnet test AutoHub.Microservices.slnx -c Release --no-build --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60

      - name: Load smoke
        run: dotnet test tests/AutoHub.IntegrationTests/AutoHub.IntegrationTests.csproj -c Release --no-build --verbosity normal --filter "Category=LoadSmoke"

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
