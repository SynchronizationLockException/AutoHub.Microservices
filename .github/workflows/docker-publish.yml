name: Docker Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - car-catalog
          - rental
          - sales
          - payment
          - auth
          - notification
    steps:
      - uses: actions/checkout@v4

      - name: Map service to Dockerfile
        id: map
        run: |
          case "${{ matrix.service }}" in
            api-gateway) echo "path=src/Gateway/ApiGateway" >> $GITHUB_OUTPUT ;;
            car-catalog) echo "path=src/Services/CarCatalogService/CarCatalogService.Api" >> $GITHUB_OUTPUT ;;
            rental) echo "path=src/Services/RentalService/RentalService.Api" >> $GITHUB_OUTPUT ;;
            sales) echo "path=src/Services/SalesService/SalesService.Api" >> $GITHUB_OUTPUT ;;
            payment) echo "path=src/Services/PaymentService/PaymentService.Api" >> $GITHUB_OUTPUT ;;
            auth) echo "path=src/Services/AuthService/AuthService.Api" >> $GITHUB_OUTPUT ;;
            notification) echo "path=src/Services/NotificationService/NotificationService.Api" >> $GITHUB_OUTPUT ;;
          esac

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.map.outputs.path }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/autohub-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/autohub-${{ matrix.service }}:${{ github.sha }}
